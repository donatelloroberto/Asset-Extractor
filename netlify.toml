[build]
  command = "npm run build"
  publish = "dist/public"

[dev]
  command = "npm run dev"
  targetPort = 5173

# Route all Stremio Addon paths to the Netlify Serverless Function
[[redirects]]
  from = "/manifest.json"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*/manifest.json"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*/catalog/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*/meta/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*/stream/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/catalog/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/meta/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/stream/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/proxy/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

# Fallback: Route all other requests (frontend pages) to Vite's index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200